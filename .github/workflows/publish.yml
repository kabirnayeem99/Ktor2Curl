name: Publish

# Publishes all KMP artifacts (jvm, android, ios*) to Maven Central when a GitHub Release is
# published. Runs on macOS because the iOS targets can only be built/published there.
on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # vanniktech maven-publish reads these ORG_GRADLE_PROJECT_* env vars automatically.
      # In-memory GPG (signingInMemoryKey) is used so no keyring file is needed on the runner.
      # Configure the four repo secrets in Settings → Secrets and variables → Actions.
      - name: Publish and release
        run: ./gradlew :ktor2curl:publishAndReleaseToMavenCentral --no-configuration-cache --console=plain
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
